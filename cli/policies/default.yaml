# Damping default policy — installed to ~/.damping/policy.yaml by `damping init`.
# Schema documented in docs/cli-reference.md §13. This file controls which
# rules are active and at what risk/action — not the matching grammar itself.
#
# The matching grammar has two interchangeable implementations, selected by
# the optional "engine" field below (defaults to "native" when omitted):
#   - native (default): hardcoded Go in core/policy/rules.go. Zero extra
#     dependencies — the right choice for the individual-tier CLI.
#   - opa: embedded OPA/Rego (core/policy/policy.rego). Real policy-as-code,
#     suited to Phase 3's Gateway/enterprise deployments — see
#     docs/architecture.md §4. Both produce identical decisions for every
#     rule id below; core/policy/opa_equivalence_test.go proves it.
# engine: native
version: 1

protected_paths:
  - ~/.ssh
  - ~/.aws
  - .env
  - .env.production

allowlisted_install_domains:
  - damping.dev
  - raw.githubusercontent.com

rules:
  - id: destructive.rm_rf_protected
    description: Recursive+force delete of a path that isn't a known regenerable build/cache directory (node_modules, dist, build, ...) — for your home directory, filesystem root, or a configured protected path, this could destroy irreplaceable data
    risk: critical
    action: prompt

  - id: destructive.git_push_force
    description: Force-push can overwrite remote history
    risk: high
    action: prompt

  - id: destructive.sql_drop_truncate
    description: DROP TABLE / TRUNCATE (SQL clients), or dropDatabase()/collection.drop()/an unfiltered deleteMany()/remove() (mongosh) issued via a shell-invoked DB client
    risk: high
    action: prompt

  - id: destructive.chmod_777_recursive
    description: Recursive world-writable permissions
    risk: medium
    action: prompt

  - id: destructive.curl_pipe_sh_unallowlisted
    description: curl|sh, curl|bash, curl|zsh, wget|sh, wget|bash, or wget|zsh from a domain not in allowlisted_install_domains
    risk: medium
    action: prompt

  - id: destructive.encoded_payload_pipe
    description: base64-decode (or similar) piped into a shell/eval
    risk: high
    action: prompt

  - id: destructive.proc_sandbox_bypass
    description: Known /proc-based sandbox bypass path literals
    risk: critical
    action: deny

  - id: destructive.dynamic_command_construction
    description: Command name built dynamically (e.g. command substitution) and cannot be statically resolved
    risk: medium
    action: prompt

  - id: destructive.write_protected_path
    description: Output redirected (>, >>, etc) into a protected path
    risk: critical
    action: prompt

  - id: mcp.destructive_tool_call
    description: MCP tool the server itself declared destructive (ToolAnnotations.DestructiveHint)
    risk: high
    action: prompt

  - id: self_protection.damping_off_attempt
    description: Agent tried to run "damping off" itself via its own Bash tool call (the Ona-incident failure mode) — a human running it directly at their own terminal never reaches this rule
    risk: critical
    action: deny

# mcp.write_tool_unscoped_identity is implemented (core/policy/rules.go) but
# deliberately NOT listed here: the individual tier has no identity system
# to bind to (ActionEvent.Identity is always empty pre-Phase 5), so this
# rule would fire on nearly every non-explicitly-read-only MCP tool call —
# a constant nag, not a useful signal. Phase 5's enterprise policy adds it
# back once identity binding makes "unscoped" meaningful.

# Populated at runtime by the TTY prompt's "always allow/deny" choice.
# Hand-editing is fine (that's what `damping policy edit` is for) but these
# usually grow organically as you use the tool.
always_allow: []
always_deny: []
