# Damping default policy — installed to ~/.damping/policy.yaml by `damping init`.
# Schema documented in docs/cli-reference.md §13. This file controls which
# rules are active and at what risk/action — not the matching grammar itself.
#
# The matching grammar has two interchangeable implementations, selected by
# the optional "engine" field below (defaults to "native" when omitted):
#   - native (default): hardcoded Go in core/policy/rules.go. Zero extra
#     dependencies — the right choice for the individual-tier CLI.
#   - opa: embedded OPA/Rego (core/policy/policy.rego). Real policy-as-code,
#     suited to Phase 3's Gateway/enterprise deployments — see
#     docs/architecture.md §4. Both produce identical decisions for every
#     rule id below; core/policy/opa_equivalence_test.go proves it.
# engine: native
version: 1

protected_paths:
  - ~/.ssh
  - ~/.aws
  - .env
  - .env.production
  # Added by the 2026-07 dangerous-command-coverage expansion research:
  # also read by destructive.secret_exfiltration (reading one of these AND
  # sending it to a non-allowlisted network destination), not just the
  # rm/write-protection rules above. Crypto wallet keystores are included
  # here deliberately as entries in this one general list rather than a
  # separate "crypto rule" — the TrapDoor campaign (2026/5, verified via
  # socket.dev) used exactly this read-then-exfiltrate shape against
  # Claude Code/Cursor to steal Solana/Sui/Aptos wallet keys, and the
  # detection shape is identical regardless of which credential it is.
  - ~/.npmrc
  - ~/.netrc
  - ~/.docker/config.json
  - ~/.kube/config
  - ~/.config/solana
  - ~/.foundry/keystores
  - ~/.ethereum/keystore
  # Added by the 2026-07 agent-asset-protection expansion: the AI agents'
  # own config/asset directories — installed skills, subagents, commands,
  # plugins, MCP registrations, settings, and per-project session/memory
  # state. Claude Code's ~/.claude also holds .credentials.json (OAuth
  # tokens), so these entries do double duty: rm/write protection AND
  # destructive.secret_exfiltration coverage. Protecting the directory
  # root wholesale (not carving out per-subdir) mirrors the existing
  # ~/.ssh / ~/.aws convention; the accepted cost is one extra prompt if
  # an agent deliberately clears a regenerable cache subdir. A real
  # incident grounds this: Claude Code's own process silently deleting
  # user-managed files from ~/.claude/agents/ (anthropics/claude-code
  # issue #41415), and the skills-CLI mass-wipe incident behind
  # destructive.agent_asset_mass_removal (vercel-labs/skills #604).
  - ~/.claude
  - .claude
  - ~/.codex
  - ~/.cursor

allowlisted_install_domains:
  - damping.dev
  - raw.githubusercontent.com

# Checked by destructive.secret_exfiltration — deliberately a separate list
# from allowlisted_install_domains above (installing from a domain and
# sending local secrets to a domain are different trust decisions).
allowlisted_egress_domains:
  - damping.dev

rules:
  - id: destructive.rm_rf_protected
    description: Recursive+force delete of your home directory, the filesystem root, a configured protected path, or a well-known system directory (/etc, /usr, /var, ...) — this could destroy irreplaceable data or break the whole machine
    risk: critical
    action: prompt

  - id: destructive.rm_rf_unrecognized_path
    description: Recursive+force delete of a path that isn't a known regenerable build/cache directory (node_modules, dist, build, ...) or OS temp scratch space (/tmp, /var/tmp), but also isn't one of the genuinely catastrophic targets destructive.rm_rf_protected covers — worth a confirmation, but a real order of magnitude less severe than deleting your home directory
    risk: medium
    action: prompt

  - id: destructive.git_push_force
    description: Force-push can overwrite remote history
    risk: high
    action: prompt

  - id: destructive.sql_drop_truncate
    description: DROP TABLE / TRUNCATE / UPDATE or DELETE with no WHERE clause (SQL clients), dropDatabase()/collection.drop()/an unfiltered deleteMany()/remove() (mongosh), or FLUSHALL/FLUSHDB (redis-cli) issued via a shell-invoked DB client
    risk: high
    action: prompt

  - id: destructive.chmod_777_recursive
    description: Recursive world-writable permissions
    risk: medium
    action: prompt

  - id: destructive.curl_pipe_sh_unallowlisted
    description: curl|sh, curl|bash, curl|zsh, wget|sh, wget|bash, or wget|zsh from a domain not in allowlisted_install_domains
    risk: medium
    action: prompt

  - id: destructive.encoded_payload_pipe
    description: base64-decode (or similar) piped into a shell/eval
    risk: high
    action: prompt

  - id: destructive.proc_sandbox_bypass
    description: Known /proc-based sandbox bypass path literals
    risk: critical
    action: deny

  - id: destructive.dynamic_command_construction
    description: Command name built dynamically (e.g. command substitution) and cannot be statically resolved
    risk: medium
    action: prompt

  - id: destructive.write_protected_path
    description: Output redirected (>, >>, etc) into a protected path
    risk: critical
    action: prompt

  - id: mcp.destructive_tool_call
    description: MCP tool the server itself declared destructive (ToolAnnotations.DestructiveHint)
    risk: high
    action: prompt

  - id: self_protection.damping_off_attempt
    description: Agent tried to run "damping off" itself via its own Bash tool call (the Ona-incident failure mode) — a human running it directly at their own terminal never reaches this rule
    risk: critical
    action: deny

  # --- 2026-07 dangerous-command-coverage expansion ---
  # See core/policy/rules_expansion.go's doc comments for the real-world
  # incidents motivating each of these (DataTalks.Club/incidentdatabase.ai
  # #1424; the Claude Code CHANGELOG v2.1.183 precedent; the TrapDoor
  # campaign).

  - id: destructive.iac_destroy
    description: terraform/pulumi/cdk destroy — the exact command class that deleted a production account in a real, documented incident (an agent decided to "clean up and start over")
    risk: critical
    action: prompt

  - id: destructive.iac_apply_unreviewed
    description: terraform apply/pulumi up with an auto-approve/skip-preview flag — skips the tool's own human-review step, itself the root-cause signal in real incidents
    risk: high
    action: prompt

  - id: destructive.git_history_destructive
    description: git reset --hard, clean -f*, stash clear/drop, checkout -- . (discard all local changes), or filter-branch/filter-repo (history rewrite) — destructive git operations beyond force-push
    risk: high
    action: prompt

  - id: destructive.secret_exfiltration
    description: A known-sensitive path (SSH/AWS/crypto-wallet/other credential files in protected_paths) read and sent to a network destination not in allowlisted_egress_domains
    risk: critical
    action: prompt

  # --- 2026-07 non-Bash attack-surface expansion ---
  # Claude Code only (see docs/cli-reference.md §11) — cli/cmd/hook.go now
  # also intercepts Write/Edit/MultiEdit tool calls, not just Bash. Cursor
  # has no pre-write hook at all (only a non-blocking after-the-fact one);
  # Codex's PreToolUse only fires for Bash. See core/policy/
  # rules_configwrite.go's doc comments for the real CVEs motivating these.

  - id: destructive.agent_permission_escalation
    description: A write to an agent/IDE settings file (.vscode/settings.json, .claude/settings.json) enables an auto-approve/skip-confirmation key, letting future tool calls bypass human confirmation entirely
    risk: critical
    action: prompt

  - id: destructive.git_hook_write
    description: A write targets a file under .git/hooks/ — a code-execution persistence mechanism that runs automatically on future git operations
    risk: high
    action: prompt

  - id: destructive.npm_lifecycle_script_write
    description: A write to package.json introduces or modifies a postinstall/preinstall/prepare script, which npm/pnpm/yarn will execute automatically at install time
    risk: high
    action: prompt

  # --- 2026-07 wave 2 coverage expansion ---
  # See core/policy/rules_wave2.go's doc comments for the real-world
  # incidents motivating each of these (Gustavo Zanotto's kubectl
  # wrong-namespace postmortem; the compromised Amazon Q Developer VS Code
  # extension, July 2025; WhisperGate/DEV-0586's MBR-wiper; the
  # finch-rust/sha-rust crates.io incident, 2025-12-05; the rest-client
  # RubyGems compromise, CVE-2019-15224; Socket's Discord-webhook-as-C2
  # campaign).

  - id: destructive.kubectl_bulk_delete
    description: kubectl delete namespace, or kubectl delete against deployments/pods/pvc/pv/all with --all or --all-namespaces — bulk destruction of an entire namespace or workload class in one command
    risk: critical
    action: prompt

  - id: destructive.cloud_cli_mass_delete
    description: aws ec2 terminate-instances, aws s3 rm --recursive, aws s3 rb --force, aws rds delete-db-instance, gcloud compute instances delete, or az vm delete — cloud CLI calls that mass-delete/terminate live cloud resources outside any IaC-managed workflow
    risk: critical
    action: prompt

  - id: destructive.raw_device_write
    description: dd, shred, or blkdiscard targeting a whole block device path (e.g. /dev/sda, /dev/nvme0n1) rather than a regular file or loop device — an irreversible raw overwrite of an entire disk
    risk: critical
    action: deny

  - id: destructive.cargo_publish_unreviewed
    description: cargo publish (without --dry-run), or cargo release ... --execute — publishes a crate directly to crates.io with no local review step
    risk: high
    action: prompt

  - id: destructive.gem_push_unreviewed
    description: gem push, gem bump --push, rake release, or bundle exec rake release — publishes a gem directly to RubyGems.org with no local review step
    risk: high
    action: prompt

  - id: destructive.webhook_exfiltration
    description: curl or wget sending POST data (or an uploaded file) to a Discord/Slack/Microsoft Teams incoming-webhook URL — a low-cost, unauthenticated exfiltration/C2 channel
    risk: high
    action: prompt

  # --- 2026-07 agent-asset-protection expansion ---
  # See core/policy/rules_agentasset.go's doc comments for the evidence
  # behind each of these (vercel-labs/skills issues #604/#287; the claude
  # CLI's own --help output, verified against the real binary v2.1.206).
  # The protected_paths additions above (~/.claude, .claude, ~/.codex,
  # ~/.cursor) are the other half of this expansion: they re-tier
  # rm -rf / redirect-write / exfiltration against those directories
  # through the existing rules at zero new matching logic.

  - id: destructive.agent_asset_mass_removal
    description: Bulk removal of the agent's own installed assets in one shot — skills remove --all or a '*' wildcard (documented shorthand for every skill, every agent, no confirmation, whether run as skills, npx/bunx skills, or pnpm/yarn dlx skills), claude plugin marketplace remove (cascades to every plugin sourced from it), claude plugin uninstall --prune, or claude project purge --all (deletes transcripts/tasks/file-history for every project) — none of these have an undo
    risk: critical
    action: prompt

  - id: destructive.find_delete_protected
    description: find <path> -delete targeting your home directory, the filesystem root, a configured protected path, or a well-known system directory — the same catastrophic-target set as destructive.rm_rf_protected, reached through find instead of rm
    risk: critical
    action: prompt

  # --- 2026-07 wave 3 addition ---
  # See core/policy/rules_wave3.go's doc comment for the PocketOS incident
  # this rule is grounded in.

  - id: destructive.cloud_api_raw_delete
    description: curl or wget calling a cloud/PaaS provider's raw HTTP API to delete a whole deployed resource — Railway's GraphQL API (volumeDelete, serviceDelete, and similar mutations), or a REST DELETE call to Vercel/Netlify/Render/Heroku/DigitalOcean's project/site/service/app/droplet endpoints — bypasses the provider's own CLI, and whatever confirmation step it might have, entirely
    risk: critical
    action: prompt

# mcp.write_tool_unscoped_identity is implemented (core/policy/rules.go) but
# deliberately NOT listed here: the individual tier has no identity system
# to bind to (ActionEvent.Identity is always empty pre-Phase 5), so this
# rule would fire on nearly every non-explicitly-read-only MCP tool call —
# a constant nag, not a useful signal. Phase 5's enterprise policy adds it
# back once identity binding makes "unscoped" meaningful.

# Populated at runtime by the TTY prompt's "always allow/deny" choice.
# Hand-editing is fine (that's what `damping policy edit` is for) but these
# usually grow organically as you use the tool.
always_allow: []
always_deny: []
