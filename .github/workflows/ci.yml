name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    name: core module
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: gofmt -l . | tee /tmp/gofmt.out && test ! -s /tmp/gofmt.out
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: core
          version: "~> v2"
      - run: go test ./... -race -cover

  cli:
    name: cli module (incl. BDD scenarios)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: gofmt -l . | tee /tmp/gofmt.out && test ! -s /tmp/gofmt.out
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: cli
          version: "~> v2"
      # cli/bdd runs every V1-scope features/*.feature file through godog
      # (dangerous_command, self_protection, mcp_tool_governance, audit_log,
      # policy_config) — see docs/00-統一開發計畫（定案版）.md: a scenario
      # only counts as done once it passes, so this is not optional coverage.
      - run: go test ./... -race -cover
      # cli/shell's Analyze runs on fully untrusted, adversarially-crafted
      # input by design (docs/threat-model.md §3) — 開發計畫.md mandates
      # fuzzing it explicitly and repeatedly ("shell解析器一定要fuzz，惡意
      # 輸入是常態"). A short, time-boxed run per PR catches regressions
      # against the seed corpus's mutations without materially slowing CI;
      # any crash a longer local run turns up gets its input committed
      # under cli/shell/testdata/fuzz/FuzzAnalyze/ as a permanent, always-run
      # regression case (go test picks those up even without -fuzz).
      - run: go test ./shell/... -run=^$ -fuzz=FuzzAnalyze -fuzztime=30s

  release-check:
    name: release tooling (.goreleaser.yaml)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      # Validates .goreleaser.yaml and does a real cross-platform snapshot
      # build (no GitHub token or tap repo access needed) on every PR —
      # catches a regression here at review time, not the day someone
      # actually pushes a release tag.
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish

  security:
    name: gosec + SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: gosec (core)
        uses: securego/gosec@master
        with:
          args: "-fmt sarif -out core-gosec.sarif ./core/..."
      - name: gosec (cli)
        uses: securego/gosec@master
        with:
          args: "-fmt sarif -out cli-gosec.sarif ./cli/..."
      - name: SBOM (core)
        run: |
          go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
          (cd core && cyclonedx-gomod mod -json -output ../core-sbom.json)
      - name: SBOM (cli)
        run: |
          (cd cli && cyclonedx-gomod mod -json -output ../cli-sbom.json)
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            core-sbom.json
            cli-sbom.json
