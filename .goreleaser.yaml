# GoReleaser config for the `damping` binary (cli/) — Phase 1 requires making
# install as easy as possible: Homebrew, a one-line install script, and
# GitHub Releases binaries for every platform. See README.md's Quick Start,
# which already advertises `brew install damping` and
# `curl -sSL https://damping.dev/install | sh` as the expected UX.
#
# core/ is not built or released independently — it's a library dependency
# of cli/, never installed on its own (see docs/architecture.md §1).
#
# github.owner/brews.repository.owner and the damping.dev URLs below use the
# same placeholder org/domain already used throughout README.md and
# docs/00-統一開發計畫（定案版）.md, pending Tim's own confirmation/
# registration of both (see that doc's "立即可執行的下一步" item 1) — this
# file is real, working release tooling ready to activate the moment those
# are confirmed, not a guess at unconfirmed infrastructure.
#
# Test locally without any real GitHub token or tap repo access:
#   goreleaser release --snapshot --clean --skip=publish
version: 2

project_name: damping

before:
  hooks:
    # Hard-fails (rather than silently tidying and proceeding) if go mod
    # tidy would change anything — a release build should never ship a
    # binary built from a dependency resolution nobody reviewed or
    # committed. Found via adversarial review of an earlier version of this
    # file, which just ran `go mod tidy` unconditionally.
    - sh -c "cd cli && go mod tidy && git diff --exit-code -- go.mod go.sum"

builds:
  - id: damping
    dir: cli
    main: .
    binary: damping
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      # Windows/arm64 is not a supported target yet — cli/ui's TTY prompter
      # only has a Unix implementation plus a documented Windows stub that
      # falls back to deny-by-default (see README.md's "designed but not
      # yet built" list), so this isn't a real platform to ship for now.
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X github.com/amplify-lab/damping/cli/cmd.Version={{.Version}}

archives:
  - id: damping
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: amplify-lab
    name: damping

# homebrew_casks, not the older brews: key — brews was soft-deprecated at
# v2.10 and hard-deprecated (enforced, `goreleaser check` fails) at v2.16.
# GoReleaser's own guidance for exactly this case (a pre-compiled CLI
# binary, not a GUI .app bundle) is to use a cask with `binaries:` — see
# https://goreleaser.com/customization/homebrew_casks/. `license` has no
# effect on a cask (GoReleaser's own schema notes this); the repo's
# top-level LICENSE file is what actually governs, and is bundled into the
# archive itself via archives[0].files above.
homebrew_casks:
  - name: damping
    repository:
      owner: amplify-lab
      name: homebrew-tap
      # The default GITHUB_TOKEN a release workflow run gets is scoped only
      # to the damping repo itself — pushing a formula/cask update to this
      # separate homebrew-tap repo needs its own PAT or GitHub App token,
      # supplied via this env var (see .github/workflows/release.yml).
      # Found missing via adversarial review: this repository.token field
      # didn't exist at all in an earlier version of this file, silently
      # falling back to the wrong (repo-scoped) token instead of erroring
      # clearly, even once the HOMEBREW_TAP_GITHUB_TOKEN secret is set.
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://damping.dev"
    description: "One policy, one audit trail — across your terminal and your MCP servers."
    binaries:
      - damping
